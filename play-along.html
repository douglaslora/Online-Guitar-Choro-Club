<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Play Along — Online Guitar Choro Club</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --yellow:#F9C74F;--dark:#1A1A2E;--red:#E63946;--teal:#43AA8B;
  --blue:#4CC9F0;--purple:#9B5DE5;--orange:#F4A261;--cream:#FDF8ED;--navy:#11111F;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Raleway',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;padding-bottom:40px;}
.stripe{height:6px;background:linear-gradient(90deg,var(--red) 0 16.6%,var(--orange) 0 33.2%,var(--yellow) 0 49.8%,var(--teal) 0 66.4%,var(--blue) 0 83%,var(--purple) 0 100%);}
.wrap{max-width:560px;margin:0 auto;padding:0 20px;}
header{padding:32px 0 8px;text-align:center;}
.logo{font-size:13px;font-weight:900;color:#fff;}
.logo span{color:var(--yellow);}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:var(--teal);margin-top:14px;}
h1{font-size:32px;font-weight:900;letter-spacing:-0.02em;line-height:1.05;margin:6px 0 4px;}
.tune-composer{font-size:13px;color:rgba(253,248,237,0.5);font-style:italic;}
.tabs{display:flex;gap:8px;margin:26px 0 0;}
.tab{flex:1;background:var(--navy);border:1px solid rgba(255,255,255,0.08);color:rgba(253,248,237,0.6);border-radius:10px 10px 0 0;padding:16px 12px;font-family:inherit;font-weight:800;font-size:13px;cursor:pointer;text-align:center;transition:all 0.15s;}
.tab .role{font-size:11px;font-weight:700;color:rgba(253,248,237,0.4);display:block;margin-top:3px;}
.tab.on{color:var(--yellow);border-color:rgba(249,199,79,0.4);border-bottom-color:var(--navy);}
.tab.on .role{color:rgba(249,199,79,0.7);}
.panel{background:var(--navy);border:1px solid rgba(255,255,255,0.08);border-radius:0 0 12px 12px;padding:26px 22px;}
.you-play{text-align:center;font-size:12px;font-weight:700;color:rgba(253,248,237,0.55);margin-bottom:20px;}
.you-play strong{color:var(--yellow);font-weight:800;}
.time-row{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:rgba(253,248,237,0.5);margin-bottom:6px;font-variant-numeric:tabular-nums;}
.scrub{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,0.15);outline:none;cursor:pointer;}
.scrub::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--yellow);border:3px solid var(--navy);cursor:pointer;}
.scrub::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--yellow);border:3px solid var(--navy);cursor:pointer;}
.controls{display:flex;align-items:center;gap:12px;margin:22px 0 0;}
.play-btn{flex:1;background:var(--red);color:#fff;border:none;border-radius:8px;padding:16px 0;font-family:inherit;font-size:14px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;}
.play-btn.playing{background:var(--teal);}
.restart{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--cream);border-radius:8px;padding:16px 18px;font-size:16px;cursor:pointer;}
.tempo-label{font-size:10px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:rgba(253,248,237,0.4);margin:24px 0 10px;text-align:center;}
.tempo-seg{display:flex;gap:8px;}
.tempo-seg button{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--cream);border-radius:8px;padding:18px 0;font-family:inherit;font-weight:800;font-size:14px;cursor:pointer;transition:all 0.15s;}
.tempo-seg button.on{background:var(--yellow);color:var(--dark);border-color:var(--yellow);}
.status{text-align:center;font-size:12px;color:rgba(253,248,237,0.4);margin-top:18px;line-height:1.5;}
footer{text-align:center;margin-top:28px;font-size:11px;color:rgba(253,248,237,0.3);line-height:1.6;}
footer a{color:var(--yellow);text-decoration:none;}
</style>
</head>
<body>
<div class="stripe"></div>
<div class="wrap">
<header>
  <div class="logo">Online <span>Guitar</span> Choro Club</div>
  <div class="eyebrow">PLAY ALONG</div>
  <h1>Descendo a Serra</h1>
  <div class="tune-composer">Pixinguinha / Benedito Lacerda &middot; Session 2</div>
</header>
<div class="tabs">
  <button class="tab on" data-track="accomp">Accompaniment<span class="role">you play the melody</span></button>
  <button class="tab" data-track="melody">Melody<span class="role">you play accompaniment</span></button>
</div>
<div class="panel">
  <div class="you-play" id="youPlay">Douglas plays the <strong>accompaniment</strong> &mdash; you play the melody over it.</div>
  <div class="time-row"><span id="curTime">0:00</span><span id="totTime">0:00</span></div>
  <input type="range" class="scrub" id="scrub" min="0" max="100" value="0" step="0.1">
  <div class="controls">
    <button class="restart" id="restartBtn" title="Restart">&#8634;</button>
    <button class="play-btn" id="playBtn">Play</button>
  </div>
  <div class="tempo-label">Tempo</div>
  <div class="tempo-seg" id="tempoSeg">
    <button data-speed="60">Slow</button>
    <button data-speed="80">Study</button>
    <button data-speed="100" class="on">Performance</button>
  </div>
  <div class="status" id="status">Perfect pitch at every tempo.</div>
</div>
<footer>
  Made for the <a href="https://onlineguitarchoroclub.com">Online Guitar Choro Club</a><br>
  One choro &middot; One month &middot; One global community
</footer>
</div>
<script>
var BASE = "https://onlineguitarchoroclub.com/";
var FILES = {
  accomp: { 60:"descendo-accomp-60.mp3", 80:"descendo-accomp-80.mp3", 100:"descendo-accomp-100.mp3" },
  melody: { 60:"descendo-melody-60.mp3", 80:"descendo-melody-80.mp3", 100:"descendo-melody-100.mp3" }
};
var playBtn=document.getElementById('playBtn'),
    restartBtn=document.getElementById('restartBtn'),
    scrub=document.getElementById('scrub'),
    curTimeEl=document.getElementById('curTime'),
    totTimeEl=document.getElementById('totTime'),
    statusEl=document.getElementById('status'),
    youPlay=document.getElementById('youPlay');
var track='accomp', speed=100, players={};
function fmt(s){if(!isFinite(s))return'0:00';var m=Math.floor(s/60),x=Math.floor(s%60);return m+':'+String(x).padStart(2,'0');}
function key(t,s){return t+'-'+s;}
function makePlayer(t,s){
  var a=new Audio();
  a.src=BASE+FILES[t][s];
  a.preload='auto';
  a.addEventListener('loadedmetadata',function(){ if(t===track&&s===speed){totTimeEl.textContent=fmt(a.duration);} });
  a.addEventListener('timeupdate',function(){ if(t===track&&s===speed){curTimeEl.textContent=fmt(a.currentTime);scrub.value=a.duration?(a.currentTime/a.duration*100):0;} });
  a.addEventListener('ended',function(){ if(t===track&&s===speed){playBtn.textContent='Play';playBtn.classList.remove('playing');} });
  a.addEventListener('error',function(){ if(t===track&&s===speed){statusEl.textContent='Could not load: '+FILES[t][s];} });
  players[key(t,s)]=a;
  return a;
}
function current(){ return players[key(track,speed)]||makePlayer(track,speed); }
function stopOthers(keep){ for(var k in players){ if(k!==keep&&!players[k].paused){players[k].pause();} } }
playBtn.addEventListener('click',function(){
  var a=current(); stopOthers(key(track,speed));
  if(a.paused){a.play();playBtn.textContent='Pause';playBtn.classList.add('playing');statusEl.textContent='Playing &mdash; '+speed+'% speed.';}
  else{a.pause();playBtn.textContent='Play';playBtn.classList.remove('playing');}
});
restartBtn.addEventListener('click',function(){var a=current();a.currentTime=0;curTimeEl.textContent='0:00';scrub.value=0;});
scrub.addEventListener('input',function(){var a=current();if(a.duration){a.currentTime=a.duration*(scrub.value/100);}});
function switchSpeed(ns){
  var old=current(),wasPlaying=!old.paused,frac=old.duration?old.currentTime/old.duration:0;
  old.pause(); speed=ns; var a=current();
  var applyPos=function(){if(a.duration){a.currentTime=a.duration*frac;}};
  if(a.readyState>=1)applyPos(); else a.addEventListener('loadedmetadata',applyPos,{once:true});
  if(wasPlaying){a.play();playBtn.textContent='Pause';playBtn.classList.add('playing');}
  totTimeEl.textContent=a.duration?fmt(a.duration):'0:00';
}
function switchTrack(nt){
  current().pause(); track=nt; var a=current(); a.currentTime=0;
  playBtn.textContent='Play';playBtn.classList.remove('playing');
  curTimeEl.textContent='0:00';scrub.value=0;
  totTimeEl.textContent=a.duration?fmt(a.duration):'0:00';
  youPlay.innerHTML = nt==='accomp'
    ? 'Douglas plays the <strong>accompaniment</strong> &mdash; you play the melody over it.'
    : 'Douglas plays the <strong>melody</strong> &mdash; you play the accompaniment underneath.';
}
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    if(t.dataset.track===track)return;
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
    t.classList.add('on'); switchTrack(t.dataset.track);
  });
});
document.getElementById('tempoSeg').addEventListener('click',function(e){
  var b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#tempoSeg button').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on'); switchSpeed(parseInt(b.dataset.speed));
});
function preloadAll(){ ['accomp','melody'].forEach(function(t){[60,80,100].forEach(function(s){ if(!players[key(t,s)])makePlayer(t,s); });}); }
makePlayer('accomp',100);
setTimeout(preloadAll,300);
</script>
</body>
</html>
